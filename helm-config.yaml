# Configuration file used by the pipeline hydration step
# to render the manifests for the different environments
releaseName: &name falco
namespace: *name
environments:
  local:
    apis: &apis
    - monitoring.coreos.com/v1
    - networking.k8s.io/v1
    - networking.k8s.io/v1beta1
    - policy/v1beta1
    - rbac.authorization.k8s.io/v1
    - security.openshift.io/v1
    valueFiles:
    - values-subchart-overrides.yaml
    - values-local.yaml
  sf-k8s01-dev: &environment
    apis: *apis
    valueFiles:
    - values-subchart-overrides.yaml
  sf-k8s02-dev: *environment
  sf-k8s01-prod: *environment
